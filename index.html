<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Retro Balls - Single Player</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #1a472a;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            font-family: 'Courier New', monospace;
            overflow: hidden;
            gap: 24px;
        }

        .game-container {
            background: linear-gradient(135deg, #2d5a27 0%, #1a472a 100%);
            padding: 20px;
            border-radius: 10px;
            border: 4px solid #8b6914;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        h1 {
            color: #f0e68c;
            text-align: center;
            margin-bottom: 10px;
            text-shadow: 2px 2px #8b4513;
        }

        canvas {
            border: 3px solid #cd853f;
            background: #87ceeb;
            display: block;
        }

        .hud {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 10px;
            padding: 10px;
            background: rgba(0,0,0,0.3);
            border-radius: 5px;
        }

        .player-info {
            color: #fff;
            font-size: 14px;
        }

        .player-score {
            color: #ffd700;
            font-weight: bold;
        }

        .turn-indicator {
            padding: 8px 16px;
            border-radius: 5px;
            font-weight: bold;
            color: white;
        }

        .turn-player { background: #32cd32; }
        .turn-enemy { background: #ff6347; }

        .controls {
            text-align: center;
            color: #8fbc8f;
            font-size: 12px;
            margin-top: 10px;
        }

        .keyboard-hint {
            display: inline-block;
            background: #3a5a40;
            padding: 2px 6px;
            border-radius: 3px;
            color: #fff;
        }

        .instructions {
            color: #8fbc8f;
            font-size: 13px;
            width: 160px;
            flex-shrink: 0;
            line-height: 1.6;
        }

        .instructions h2 {
            color: #f0e68c;
            font-size: 14px;
            margin-bottom: 12px;
            text-shadow: 1px 1px #8b4513;
        }

        .instructions h3 {
            color: #ffd700;
            font-size: 12px;
            margin: 12px 0 6px;
            text-transform: uppercase;
        }

        .key {
            display: inline-block;
            background: #3a5a40;
            border: 1px solid #5a8a60;
            padding: 1px 6px;
            border-radius: 3px;
            color: #fff;
            font-size: 11px;
        }

        .instructions p {
            margin-bottom: 5px;
        }

        .game-over {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(0,0,0,0.85);
            padding: 30px 50px;
            border-radius: 10px;
            text-align: center;
            color: white;
            font-size: 24px;
            display: none;
            z-index: 100;
        }

        .game-over.show { display: block; }
    </style>
</head>
<body>
    <aside class="instructions">
        <h2>How to Play</h2>

        <h3>Movement</h3>
        <p><span class="key">←</span> <span class="key">→</span> Move</p>
        <p><span class="key">↑</span> Jump</p>

        <h3>Combat</h3>
        <p><span class="key">Space</span> Shoot</p>

        <h3>Goal</h3>
        <p>Eliminate all enemy balls. They attack you in real time — stay moving!</p>

        <h3>Scoring</h3>
        <p>+100 per hit<br>+1000 per kill<br>-10 per hit taken</p>
    </aside>
    <div class="game-container">
        <h1>Retro Balls</h1>
        <canvas id="gameCanvas" width="800" height="600"></canvas>
        <div class="hud">
            <div class="player-info">Score: <span class="player-score" id="playerScore">0</span></div>
            <div class="player-info">Enemies: <span id="enemyCount">3</span> alive</div>
        </div>
        <div class="controls">
            <span class="keyboard-hint">←</span><span class="keyboard-hint">→</span> Move &nbsp;|&nbsp;
            <span class="keyboard-hint">↑</span> Jump &nbsp;|&nbsp;
            <span class="keyboard-hint">Space</span> Shoot
        </div>
        <div class="game-over" id="gameOver"></div>
    </div>

    <script src="balls.js"></script>
</body>
</html>
